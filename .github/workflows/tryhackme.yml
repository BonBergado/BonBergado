name: TryHackMe Update Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  tryhackme-badge-update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: p4p1/tryhackme-badge-workflow@main
        with:
          username: "bonbergado"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
